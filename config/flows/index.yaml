flows:
  - type: playground
    id: Personal_Loan_Offline
    meta:
      order: 0
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A personal loan origination process where borrowers initiate applications through digital search and form completion, then await asynchronous status updates as the lender conducts offline verification and underwriting to reach a final lending decision.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Offline.yaml
  - type: playground
    id: Personal_Loan_Single_Redirection
    meta:
      order: 1
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower searches for and selects a personal loan offer within the Buyer App, then completes the loan origination process through a single redirect to the lender's platform for KYC verification, account validation, mandate setup, and agreement signing, with real-time status updates provided throughout the application lifecycle.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Single_Redirection.yaml
  - type: playground
    id: Personal_Loan_Dedupe_Check
    meta:
      order: 2
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: The flow verifies a borrower's identity against existing personal loan records during application intake to prevent duplicate submissions, enabling efficient onboarding and reducing redundant credit assessments.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Dedupe_Check.yaml
  - type: playground
    id: Gold_Loan_Foreclosure_With_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITH_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: This flow enables a borrower to initiate early foreclosure of a gold loan on the ONDC network, leveraging account aggregator for streamlined financial data verification and automated payoff calculation. The lender then executes settlement and account closure while ensuring compliance with loan lifecycle requirements and applicable cool-off periods.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Foreclosure_With_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_Foreclosure_Without_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITHOUT_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: A borrower requests early repayment of a gold loan, triggering an automated settlement process that calculates the exact payoff amount and facilitates immediate loan closure within the ONDC network.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Foreclosure_Without_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_Missed_EMI_With_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITH_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: Gold loan borrowers settle missed EMI payments using Account Aggregator-based financial consent to retrieve loan details and authorize overdue payment resolution through the ONDC network.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Missed_EMI_With_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_Missed_EMI_Without_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITHOUT_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: A gold loan borrower manually settles an overdue EMI after automatic collection fails, with the lender recalculating applicable penalties and fees, obtaining borrower confirmation, and synchronizing the repayment status across the network.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Missed_EMI_Without_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_Pre_Part_Payment_With_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITH_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: A borrower submits an early partial repayment request for their gold loan principal using account aggregation to provide financial verification, enabling the lender to validate the payment, calculate revised terms, and update the loan schedule.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Pre_Part_Payment_With_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_Pre_Part_Payment_Without_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITHOUT_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: A borrower initiates a partial advance repayment of their gold loan principal outside the regular EMI schedule without account aggregator assistance. The lender validates the payment request, processes the settlement, and provides an updated loan status reflecting the reduced outstanding principal.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Pre_Part_Payment_Without_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_With_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITH_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: A borrower applies for and completes a gold-backed loan using account aggregator integration for KYC and bank verification, with real-time lender status updates guiding the loan through approval and disbursement.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_With_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_With_Account_Aggregator_With_IGM(v-1.0.0)
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITH_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: An end-to-end gold loan application process where financial verification is streamlined through account aggregator integration, followed by multi-stage KYC forms and real-time disbursal status updates.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_With_Account_Aggregator_With_IGM_v-1_0_0_.yaml
  - type: playground
    id: Gold_Loan_With_Multiple_offers_With_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITH_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: Borrowers discover and select gold-backed loan offers from multiple lenders using account aggregator-based KYC and bank verification, progressing through underwriting to disbursement with real-time status updates.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_With_Multiple_offers_With_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_Without_Account_Aggregator
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITHOUT_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: An end-to-end gold loan origination flow where borrowers discover and apply for gold-secured loans through a buyer app, complete offline verification and documentation through guided forms, and receive real-time status updates through loan approval and disbursement.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Without_Account_Aggregator.yaml
  - type: playground
    id: Gold_Loan_Without_Account_Aggregator_With_IGM(v-1.0.0)
    usecase: GOLD LOAN
    tags:
      - WORKBENCH
      - WITHOUT_ACCOUNT_AGGREGATOR
      - REPORTABLE
    description: Direct gold loan origination with borrower-facing status tracking and integrated issue and grievance management, enabling end-to-end loan servicing without account aggregator intermediation.
    config:
      $ref: ./GOLD LOAN/Gold_Loan_Without_Account_Aggregator_With_IGM_v-1_0_0_.yaml
  - type: playground
    id: Personal_Loan_Foreclosure_Offline
    usecase: PERSONAL LOAN
    meta:
      order: 3
    tags:
      - WORKBENCH
      - REPORTABLE
    description: Enables borrowers to request and process full early repayment of a personal loan through offline channels, with lender verification and official account foreclosure. The flow manages borrower notification, manual verification, and lender-side processing through to final account closure.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Foreclosure_Offline.yaml
  - type: playground
    id: Personal_Loan_missed_emi_payment_Offline
    meta:
      order: 5
    usecase: PERSONAL LOAN
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower initiates offline settlement of a missed EMI payment including applicable penalties through a manual form-based process. The lender validates, reconciles, and confirms the payment before updating the loan account status.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Missed_EMI_Offline.yaml
  - type: playground
    id: Personal_Loan_Pre_Part_Payment_Offline
    usecase: PERSONAL LOAN
    meta:
      order: 4
    tags:
      - WORKBENCH
      - REPORTABLE
    description: A borrower initiates a partial prepayment of their outstanding personal loan principal outside the regular EMI schedule, with the lender validating the request, recalculating repayment terms and charges, and updating the loan status upon successful payment execution.
    config:
      $ref: ./PERSONAL LOAN/Personal_Loan_Pre_Part_Payment_Offline.yaml
