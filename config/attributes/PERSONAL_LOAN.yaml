meta:
  use_case_id: PERSONAL LOAN
attribute_set:
  search:
    context:
      action:
        _description:
          required: true
          usage: search
          info: |+
            Describes the Beckn protocol method being called by the sender and executed at the receiver. 

          owner: BAP
          type: string
      location:
        country:
          code:
            _description:
              required: false
              usage: IND
              info: Country code in ISO 3166-1 or ISO 3166-2 format that the BAP provides to define the geographic scope for the search request.
              owner: BAP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP specifies the country in the location context of a search request to define the geographical jurisdiction for service discovery.
            owner: BAP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: |
                This attribute describes the city code relevant to the location or the area in which seller is situated. In case of '*' it will fetch all the cities where service is being provided.
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*' it will fetch all the cities where service is being provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP specifies the city location in the search request to indicate where the transaction is intended to be completed.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: The BAP specifies where the transaction is intended to be fulfilled in the search request; the BPP echoes this location in on_search.
          owner: BAP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS12
          info: This is the domain code relevant to the context of this transaction. Here, it is "ONDC:FIS12".
          owner: BAP
          type: enum
          enums:
            - code: ONDC:FIS12
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16
          info: Describes time of request generation in RFC3339 format. This specifies the time when request is being made.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.credit.becknprotocol.io
          info: This the subscriber ID of the BAP. It is the unique id for the buyer app.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: false
          usage: e182db8d-997e-4d45-a29c-4827ae8943d5
          info: Unique identifier minted by the BAP on the search request to indicate an active user session; it persists across all API calls from search through confirm, enabling BPPs to correlate requests and deliver personalized recommendations and dynamic offerings despite not knowing the user on the BAP.
          owner: BAP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: |-
            This is a mandatory and unique identifier that persists consistently throughout a request/callback cycle.
             This value can be utilized to filter out and ignore duplicate messages coming from the BPP.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.3
          info: It explains the transaction protocol version utilized by the sender.
          owner: BAP
          type: integer
      bap_uri:
        _description:
          required: true
          usage: https://bap.credit.becknprotocol.io/
          info: This is the subscriber URL of the Buyer App (BAP) is the endpoint that accepts callbacks from Seller App (BPPs).
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: |
            Specifies the validity duration of this message in ISO8601 format, after timestamp.
          owner: BAP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP sets context on search with demographic, addressing, protocol, and transaction information that uniquely identifies and frames this transaction for all subsequent interactions.
        owner: BAP
        type: object
    message:
      intent:
        category:
          descriptor:
            code: {}
            _description:
              required: false
              usage: ""
              info: Descriptor identifying the product category the BAP is searching for.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Item category details that the BAP provides to enable the BPP to filter search results by the desired category.
            owner: BAP
            type: object
        payment:
          collected_by:
            _description:
              required: false
              usage: BPP
              info: "BAP declares its preferred payment collection model: BAP handles upfront collection and settlement to the BPP, or the BPP collects directly. The BPP honors this by omitting a payment URL if the BAP assumes collection."
              owner: BAP
              type: string
          tags:
            descriptor:
              code:
                _description:
                  required: false
                  usage: BUYER_FINDER_FEES
                  info: Payment tag descriptor codes the BAP mints in its search intent to communicate which fee types and settlement terms are relevant. The BPP echoes these codes in on_search to confirm understanding.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: BAP specifies the descriptor to characterize the payment term being searched. BPP echoes this descriptor in on_search to confirm recognition of the requested payment configuration.
                owner: BAP
                type: object
            display:
              _description:
                required: false
                usage: "false"
                info: <no-enough-data>
                owner: BAP
                type: boolean
            list:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: BUYER_FINDER_FEES_TYPE
                    info: BAP specifies the payment condition type code in the search request to filter offerings by the loan's applicable fee structure or interest terms.
                    owner: BAP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Descriptor within each payment tag that the BAP provides during search and the BPP validates in its on_search response.
                  owner: BAP
                  type: object
              value:
                _description:
                  required: false
                  usage: percent-annualized
                  info: The BAP specifies payment tag values in the search intent to communicate payment-related parameters or constraints. These tag values are validated to ensure they meet system requirements.
                  owner: BAP
                  type: string
              _description:
                required: false
                usage: ""
                info: ""
                owner: BAP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of payment tags the BAP includes in the search intent; must be non-empty.
              owner: BAP
              type: object
          _description:
            required: false
            usage: ""
            info: Container holding payment details the BAP specifies on search to indicate how the customer wants to pay; BPP echoes it in on_search.
            owner: BAP
            type: object
        _description:
          required: false
          usage: ""
          info: Container in which the BAP declares the consumer's intent to purchase or avail a product or service, specifying the desired provider, location, timing, and payment method to enable the BPP to identify matching offerings.
          owner: BAP
          type: object
      _description:
        required: false
        usage: ""
        info: Container holding the search inquiry details that the BAP submits to find gold loan options.
        owner: BAP
        type: object
  on_search:
    context:
      action:
        _description:
          required: true
          usage: search
          info: |+
            Describes the Beckn protocol method being called by the sender and executed at the receiver. 

          owner: BAP
          type: string
      location:
        country:
          code:
            _description:
              required: false
              usage: IND
              info: Country code in ISO 3166-1 or ISO 3166-2 format that the BAP provides to define the geographic scope for the search request.
              owner: BPP
              type: enum
              enums:
                - code: IND
                  description: Represents the country
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP specifies the country in the location context of a search request to define the geographical jurisdiction for service discovery.
            owner: BPP
            type: object
        city:
          code:
            _description:
              required: true
              usage: "*"
              info: |
                This attribute describes the city code relevant to the location or the area in which seller is situated. In case of '*' it will fetch all the cities where service is being provided.
              owner: BAP
              type: enum
              enums:
                - code: std:080
                  description: Represent the city code that identifies the cities. In case of '*' it will fetch all the cities where service is being provided.
                  reference: <PR/Issue/Discussion Links md format text>
          _description:
            required: false
            usage: ""
            info: The BAP specifies the city location in the search request to indicate where the transaction is intended to be completed.
            owner: BPP
            type: object
        _description:
          required: false
          usage: ""
          info: The BAP specifies where the transaction is intended to be fulfilled in the search request; the BPP echoes this location in on_search.
          owner: BPP
          type: object
      domain:
        _description:
          required: true
          usage: ONDC:FIS12
          info: This is the domain code relevant to the context of this transaction. Here, it is "ONDC:FIS12".
          owner: BAP
          type: enum
          enums:
            - code: ONDC:FIS12
              description: Updated domain namespace
              reference: <PR/Issue/Discussion Links md format text>
      timestamp:
        _description:
          required: true
          usage: 2023-03-23T04:41:16
          info: Describes time of request generation in RFC3339 format. This specifies the time when request is being made.
          owner: BAP
          type: string
      bap_id:
        _description:
          required: true
          usage: bap.credit.becknprotocol.io
          info: This the subscriber ID of the BAP. It is the unique id for the buyer app.
          owner: BAP
          type: string
      transaction_id:
        _description:
          required: false
          usage: e182db8d-997e-4d45-a29c-4827ae8943d5
          info: Unique session identifier that the BAP mints in search and the BPP echoes in on_search and all subsequent responses, allowing the BPP to correlate requests and send personalized recommendations or dynamic offerings without needing to know the BAP user's identity.
          owner: BPP
          type: string
      message_id:
        _description:
          required: true
          usage: 13ba8018f176
          info: |-
            This is a mandatory and unique identifier that persists consistently throughout a request/callback cycle.
             This value can be utilized to filter out and ignore duplicate messages coming from the BPP.
          owner: BAP
          type: string
      version:
        _description:
          required: true
          usage: 2.0.3
          info: It explains the transaction protocol version utilized by the sender.
          owner: BAP
          type: integer
      bap_uri:
        _description:
          required: true
          usage: https://bap.credit.becknprotocol.io/
          info: This is the subscriber URL of the Buyer App (BAP) is the endpoint that accepts callbacks from Seller App (BPPs).
          owner: BAP
          type: string
      ttl:
        _description:
          required: true
          usage: PT30S
          info: |
            Specifies the validity duration of this message in ISO8601 format, after timestamp.
          owner: BAP
          type: string
      bpp_uri:
        _description:
          required: true
          usage: https://bpp.credit.becknprotocol.org
          info: |2-
            
              The subscriber URL of the Seller App (BPP) is the endpoint that accepts callbacks from the Buyer App (BAP).
          owner: BPP
          type: string
      bpp_id:
        _description:
          required: true
          usage: bpp.credit.becknprotocol.org
          info: The subscriber ID of the Seller App (BPP) is the endpoint that accepts callbacks from the Buyer App (BAP).
          owner: BPP
          type: string
      _description:
        required: false
        usage: ""
        info: The BAP sets context on search with demographic, addressing, protocol, and transaction information that uniquely identifies and frames this transaction for all subsequent interactions.
        owner: BPP
        type: object
    message:
      catalog:
        descriptor:
          name: {}
          _description:
            required: false
            usage: ""
            info: The BPP provides catalog metadata in the descriptor to describe the offerings being presented in the on_search response. The descriptor is set during response generation and asserted in downstream validation.
            owner: BPP
            type: object
        providers:
          id:
            _description:
              required: false
              usage: PROVIDER_ID
              info: The BPP returns a unique identifier for each provider in the search response; if the ID is missing or is the placeholder 'PROVIDER_ID', the BPP auto-generates a UUID-based identifier. This ID is saved to the session as 'provider_id' and reused across select, confirm, and later steps.
              owner: BPP
              type: string
          descriptor:
            images:
              url: {}
              size_type: {}
              _description:
                required: false
                usage: ""
                info: The BPP returns provider images in the catalog descriptor; the BAP persists the selected provider's images in the session for reuse in subsequent steps.
                owner: BPP
                type: object
            name: {}
            short_desc: {}
            long_desc: {}
            _description:
              required: false
              usage: ""
              info: Provider identifying information the BPP includes in the catalog response to help the BAP select a provider. The descriptor is anchored in the session as selected_provider and reused across all downstream steps.
              owner: BPP
              type: object
          categories:
            id:
              _description:
                required: false
                usage: "100001"
                info: BPP returns a unique category identifier that anchors each loan category in the session; this ID persists with the selected provider across subsequent steps.
                owner: BPP
                type: string
            descriptor:
              code: {}
              name: {}
              _description:
                required: false
                usage: ""
                info: Describes a loan product category offered by the provider; the BPP includes it in on_search and it persists as part of the selected provider for validation and reuse in subsequent steps.
                owner: BPP
                type: object
            parent_category_id:
              _description:
                required: false
                usage: "100001"
                info: BPP includes this value to establish category hierarchy within the catalog; the field is part of the persisted provider and may be remapped when category deduplication applies across flows.
                owner: BPP
                type: string
            _description:
              required: false
              usage: ""
              info: List of product categories available from the provider, returned by the BPP in on_search and persisted across the transaction to enable downstream item-to-category matching and processing.
              owner: BPP
              type: object
          items:
            id: {}
            descriptor:
              code: {}
              name: {}
              _description:
                required: false
                usage: ""
                info: Container for the descriptor details of each item returned by the BPP in the search response.
                owner: BPP
                type: object
            category_ids:
              _description:
                required: false
                usage: "101123"
                info: The BPP returns category IDs with each item in the catalog to identify the product category; the BAP persists these IDs and uses them to route and process offerings across subsequent steps.
                owner: BPP
                type: string
            fulfillment_ids:
              _description:
                required: false
                usage: F1
                info: Fulfillment identifiers the BPP returns for each item, anchored in session and reused in subsequent transaction steps.
                owner: BPP
                type: string
            tags:
              descriptor:
                code:
                  _description:
                    required: false
                    usage: GENERAL_INFO
                    info: Code that identifies each item's tag descriptor type, provided by the BPP in the catalog. The value persists with the item throughout the transaction session for validation in downstream steps.
                    owner: BPP
                    type: string
                name:
                  _description:
                    required: false
                    usage: General Information
                    info: Semantic category label for the attributes grouped within an item tag descriptor. The BPP provides this name in on_search, and the BAP preserves it across subsequent transaction steps as part of the persisted items payload.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: BPP includes descriptors for item tags when publishing the catalog; these tag definitions are cached in session and referenced by the BAP during selection, initialization, and confirmation.
                  owner: BPP
                  type: object
              list:
                descriptor:
                  code:
                    _description:
                      required: false
                      usage: MIN_INTEREST_RATE
                      info: The BPP returns descriptor codes in on_search to identify each loan product's key attributes or constraints—such as interest rates, tenure, and loan amounts—enabling the BAP to reference these product terms throughout the transaction; the codes persist in the catalog items array across subsequent steps.
                      owner: BPP
                      type: string
                  name:
                    _description:
                      required: false
                      usage: Minimum Loan Amount
                      info: The BPP provides names of loan parameters (like interest rate or tenure bounds) in item tag descriptors on_search; these values persist within the items structure across select and confirm steps.
                      owner: BPP
                      type: string
                  short_desc:
                    _description:
                      required: false
                      usage: Loans starting from 9% (p.a)
                      info: The BPP includes brief summaries of key offer terms in the item tag descriptor during search, such as interest rates, tenure options, and minimum loan amounts. These descriptions persist in the session for reference when items are used in subsequent steps.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: The lender specifies the display label and descriptor metadata for each tag, enabling the BAP to communicate loan product characteristics to borrowers. This allows the BAP to render product attributes accurately during the offer presentation phase.
                    owner: BPP
                    type: object
                value:
                  _description:
                    required: false
                    usage: 9%
                    info: Tag values the BPP returns in on_search to characterize loan offer terms for each item. The BAP receives these values, which persist in the session and are reused across subsequent transaction steps.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: The BPP includes attribute tags describing each loan product in the on_search catalog; these tags persist in session for reference during selection and later steps.
                  owner: BPP
                  type: object
              display:
                _description:
                  required: false
                  usage: "true"
                  info: BPP sets this boolean flag in on_search to indicate whether the item should be displayed to the buyer; the flag persists across subsequent steps as part of the item session state.
                  owner: BPP
                  type: boolean
              _description:
                required: false
                usage: ""
                info: Tags is a container of loan offer attributes that the BPP returns in on_search; these tags persist in the session and are validated and referenced across subsequent steps until order confirmation.
                owner: BPP
                type: object
            xinput:
              head:
                descriptor:
                  name: {}
                  _description:
                    required: false
                    usage: ""
                    info: Descriptive header metadata for the form through which customers provide additional information required for this item. The BPP supplies it in on_search and BAP echoes it back in select, with the value persisting across transaction steps.
                    owner: BPP
                    type: object
                index:
                  min:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP declares in on_search the minimum index of additional input fields required from the customer to avail this item. This value persists within the item catalog and is referenced in subsequent transaction steps.
                      owner: BPP
                      type: number
                  cur:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP returns this number in on_search to represent the current index within the xinput.head, which describes additional information the customer must provide for this item. The value persists through the transaction session as part of the saved item payload.
                      owner: BPP
                      type: number
                  max:
                    _description:
                      required: false
                      usage: "0"
                      info: The BPP declares the maximum integer value of the xinput header needed for this item; the value is anchored in the session and reused by the BAP across subsequent steps to determine the scope of additional customer inputs.
                      owner: BPP
                      type: number
                  _description:
                    required: false
                    usage: ""
                    info: <no-enough-data>
                    owner: BPP
                    type: object
                headings: {}
                _description:
                  required: false
                  usage: ""
                  info: Header information describing what extended inputs from customers will be required for each item, provided in on_search and anchored in the session so the BAP can reference these requirements throughout the transaction.
                  owner: BPP
                  type: object
              form:
                id: {}
                mime_type: {}
                url: {}
                resubmit: {}
                multiple_sumbissions: {}
                _description:
                  required: false
                  usage: ""
                  info: Form specification the BPP provides for each item to guide the BAP in presenting a structured input form for collecting required user information.
                  owner: BPP
                  type: object
              required:
                _description:
                  required: false
                  usage: "true"
                  info: In on_search, the BPP indicates whether the buyer must supply external input for this loan item. The value persists with the item through later steps.
                  owner: BPP
                  type: boolean
              _description:
                required: false
                usage: ""
                info: The BPP populates xinput to specify additional inputs or documents the customer must provide for each product; the BAP persists this information across the session for use in select, init, and confirm steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: The BPP returns loan product items in the on_search response, which the BAP stores in session for use across the remainder of the transaction.
              owner: BPP
              type: object
          fulfillments:
            id:
              _description:
                required: false
                usage: F1
                info: The BPP returns a unique identifier for each fulfillment option in its catalog; the BAP anchors this ID in its session and reuses it across subsequent steps (select, confirm) to indicate which fulfillment service the buyer selected.
                owner: BPP
                type: string
            type:
              _description:
                required: false
                usage: LOAN
                info: BPP includes the fulfillment type in on_search to indicate what kind of service is offered; the value is validated and persists in the selected provider for reuse across the transaction.
                owner: BPP
                type: string
            tags:
              descriptor:
                name:
                  _description:
                    required: false
                    usage: Checklist
                    info: The BPP provides this descriptor name to label the fulfillment requirement or phase. The BAP anchors it in the selected provider and carries it through the transaction session for reference in later steps.
                    owner: BPP
                    type: string
                code:
                  _description:
                    required: false
                    usage: CHECKLISTS
                    info: BPP returns this descriptor code in on_search to identify fulfillment tag types; the BAP validates and persists it in the selected provider for reuse across later steps.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Metadata descriptor for each fulfillment tag within a provider's offering, returned in the BPP's on_search catalog response; the entire provider object—including this descriptor—is anchored in session as selected_provider for reuse in downstream steps.
                  owner: BPP
                  type: object
              display:
                _description:
                  required: false
                  usage: "false"
                  info: Boolean flag the BPP includes for each fulfillment in the on_search response catalog. The containing provider object is persisted in the session as selected_provider and consumed by downstream steps when the BAP selects this provider.
                  owner: BPP
                  type: boolean
              list:
                descriptor:
                  code:
                    _description:
                      required: false
                      usage: PERSONAL_INFORMATION
                      info: Code that categorizes a fulfillment requirement or information dependency. The BPP returns these codes in on_search to structure required information or processes; the value persists within the selected provider and is referenced in subsequent transaction steps.
                      owner: BPP
                      type: string
                  name:
                    _description:
                      required: false
                      usage: Personal Information
                      info: The BPP returns a label for each tag associated with a fulfillment plan—such as "Personal Information" or "E-MANDATE"—to categorize the type of documentation or requirement involved. This fulfillment structure is anchored in the session with the selected provider and reused by later steps.
                      owner: BPP
                      type: string
                  short_desc:
                    _description:
                      required: false
                      usage: Provide your Personal Info to proceed further
                      info: Brief instructional text that the BPP includes in on_search to specify what customer actions or information must be completed; this text is preserved in the selected provider record and referenced by the BAP in subsequent fulfillment steps.
                      owner: BPP
                      type: string
                  _description:
                    required: false
                    usage: ""
                    info: Metadata describing fulfillment tags that the BPP includes in its on_search provider catalog; the parent provider is persisted as selected_provider for use across subsequent steps.
                    owner: BPP
                    type: object
                value:
                  _description:
                    required: false
                    usage: PENDING
                    info: A fulfillment tag value that the BPP declares in on_search for each service plan; the BAP uses this to inform selection, and the value anchors to the chosen provider, persisting across subsequent steps.
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Fulfillment tags returned by the BPP in the on_search catalog are persisted with the provider selection and remain available to the transaction across subsequent steps.
                  owner: BPP
                  type: object
              _description:
                required: false
                usage: ""
                info: Tags that the BPP includes for each fulfillment option in on_search; these tags persist with the selected provider across subsequent transaction steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of fulfillments the BPP returns for each provider; anchored with the selected provider and reused across subsequent steps.
              owner: BPP
              type: object
          payments:
            type:
              _description:
                required: false
                usage: ON_FULFILLMENT
                info: The BPP declares the payment type for each payment method under each provider in the catalog response. The BAP anchors this value in its session as part of the selected provider and reuses it through subsequent order steps.
                owner: BPP
                type: string
            id:
              _description:
                required: false
                usage: LOAN_DISBURSMENT_ID
                info: Identifier for a payment method within the provider's offerings, returned by the BPP in on_search. The BAP anchors this value in session as part of the provider context and carries it forward across subsequent transaction steps.
                owner: BPP
                type: string
            status:
              _description:
                required: false
                usage: NOT-PAID
                info: BPP returns the payment status for each provider in the on_search response. The selected provider's status is anchored in session and reused across subsequent transaction steps.
                owner: BPP
                type: string
            collected_by: {}
            time:
              label:
                _description:
                  required: false
                  usage: LOAN_DISBURSMENT
                  info: The BPP returns a descriptive label identifying the payment timing or disbursement event type (such as when funds are disbursed or when repayment is due), which persists with the selected provider across transaction steps.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP specifies payment timing constraints for each provider in on_search; the selected provider is anchored in session and reused by later steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: Array of payment options the BPP provides for each provider in the on_search catalog; these details persist with the selected provider and are referenced in subsequent steps.
              owner: BPP
              type: object
          tags:
            descriptor:
              code:
                _description:
                  required: false
                  usage: CONTACT_INFO
                  info: BPP returns this descriptor code in on_search to classify the metadata tags associated with each provider; distinct codes identify different information categories. The provider containing these tags is persisted as selected_provider and reused throughout the loan flow.
                  owner: BPP
                  type: string
              name:
                _description:
                  required: false
                  usage: Contact Info
                  info: The BPP labels each tag with a human-readable name identifying the information category or capability it represents; this name persists with the selected provider throughout the transaction.
