                        reference: <PR/Issue/Discussion Links md format text
                      - code: SET_LOAN_AMOUNT
                        description: Describes the form heading as JOURNEY_OFFLINE
                        reference: <PR/Issue/Discussion Links md format text
                      - code: PERSONAL_INFORMATION
                        description: Describes the form heading as PERSONAL_INFORMATION
                        reference: <PR/Issue/Discussion Links md format text
                      - code: ACCOUNT_INFORMATION
                        description: Describes the form heading as ACCOUNT_INFORMATION
                        reference: <PR/Issue/Discussion Links md format text
                      - code: EMANDATE
                        description: Describes the form heading as EMANDATE
                        reference: <PR/Issue/Discussion Links md format text
                      - code: LOAN_AGREEMENT
                        description: Describes the form heading as LOAN_AGREEMENT
                        reference: <PR/Issue/Discussion Links md format text
                _description:
                  required: false
                  usage: ""
                  info: Header information describing what extended inputs from customers will be required for each item, provided in on_search and anchored in the session so the BAP can reference these requirements throughout the transaction.
                  owner: BPP
                  type: object
              form:
                url:
                  _description:
                    required: false
                    usage: https://6vs8xnx5i7.icicibank.co.in/loans/xinput/formid/a23f2fdfbbb8ac402bf259d75
                    info: This refers to the current integer value of the xinput header which describes the additional information required from the customer to purchase/avail the item.
                    owner: BPP
                    type: string
                mime_type:
                  _description:
                    required: false
                    usage: text/html
                    info: This describes the type of the form generated.
                    owner: BPP
                    type: string
                resubmit:
                  _description:
                    required: false
                    usage: Optional
                    info: After reopening the form, this attribute keeps in check whether the form has been resubmitted or not
                    owner: BPP
                    type: boolean
                multiple_sumbissions:
                  _description:
                    required: false
                    usage: Optional
                    info: This attribute defines if the form can be submitted multiple times or not.
                    owner: BPP
                    type: boolean
                id:
                  _description:
                    required: false
                    usage: d097c2f5-cb8d-42fe-900e-dfecdede16fb
                    info: This refers to the unique system id of the form
                    owner: BPP
                    type: string
                _description:
                  required: false
                  usage: ""
                  info: Form specification the BPP provides for each item to guide the BAP in presenting a structured input form for collecting required user information.
                  owner: BPP
                  type: object
              form_response:
                status:
                  _description:
                    required: false
                    usage: SUCCESS
                    info: |
                      Describes the status of form 
                    owner: BPP
                    type: enum
                    enums:
                      - code: PENDING
                        description: Describes the current state of the request.
