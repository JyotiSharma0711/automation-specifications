          id:
            _description:
              required: false
              usage: PROVIDER_ID
              info: The BPP returns a unique identifier for each provider in the search response; if the ID is missing or is the placeholder 'PROVIDER_ID', the BPP auto-generates a UUID-based identifier. This ID is saved to the session as 'provider_id' and reused across select, confirm, and later steps.
              owner: BPP
              type: string
          descriptor:
            name:
              _description:
                required: true
                usage: ICICI Bank
                info: It refers to the financial institution that is involved in providing the loan.
                owner: BPP
                type: string
            short_desc:
              _description:
                required: false
