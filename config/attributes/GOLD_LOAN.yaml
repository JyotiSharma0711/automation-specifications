              owner: BPP
              type: object
          categories:
            id:
              _description:
                required: false
                usage: "101123"
                info: BPP returns a unique category identifier that anchors each loan category in the session; this ID persists with the selected provider across subsequent steps.
                owner: BPP
                type: string
            descriptor:
              code:
                _description:
                  required: true
                  usage: GOLD_LOAN
                  info: It refers to the explanation of the type of the loan. Describes a secured credit provided by financial institutions based on value of the gold declared by the customer
                  owner: BPP
                  type: enum
                  enums:
                    - code: PERSONAL_LOAN
                      description: Describes an unsecured credit provided by financial institutions based on criteria like employment history, repayment capacity, income level, profession and credit history
                      reference: <PR/Issue/Discussion Links md format text
                    - code: BUREAU_LOAN
                      description: Describes the child category as Bureau Loan
                      reference: <PR/Issue/Discussion Links md format text
                    - code: AA_PERSONAL_LOAN
                      description: Describes the child category as Account Aggregator Loan
                      reference: <PR/Issue/Discussion Links md format text
                    - code: GOLD_LOAN
                      description: Describes the category as GOLD_LOAN
                      reference: <PR/Issue/Discussion Links md format text
                    - code: AA_LOAN
                      description: Describes the child category as Account Aggregator Loan
                      reference: <PR/Issue/Discussion Links md format text
              name:
                _description:
                  required: true
                  usage: Gold Loan
                  info: It refers to the explanation of the type of the loan.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: Describes a loan product category offered by the provider; the BPP includes it in on_search and it persists as part of the selected provider for validation and reuse in subsequent steps.
                owner: BPP
                type: object
            _description:
              required: false
              usage: ""
              info: List of product categories available from the provider, returned by the BPP in on_search and persisted across the transaction to enable downstream item-to-category matching and processing.
              owner: BPP
              type: object
            parent_category_id:
              _description:
                required: false
                usage: "101123"
                info: BPP includes this value to establish category hierarchy within the catalog; the field is part of the persisted provider and may be remapped when category deduplication applies across flows.
                owner: BPP
                type: string
