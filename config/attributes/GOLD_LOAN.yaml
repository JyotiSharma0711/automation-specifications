                  owner: BPP
                  type: string
              size_type:
                _description:
                  required: false
                  usage: sm
                  info: It defines the image size, and the network policy can determine the default dimensions for each type.
                  owner: BPP
                  type: string
              _description:
                required: false
                usage: ""
                info: The BPP returns provider images in the catalog descriptor; the BAP persists the selected provider's images in the session for reuse in subsequent steps.
                owner: BPP
                type: object
            _description:
              required: false
